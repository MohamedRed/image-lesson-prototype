<!-- @template name="Live Ride Screen" description="Map-backed live-ride screen: glass HUD, SOS, driver card and CTA in a bottom sheet." -->
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Liive Ride — Live Ride Screen</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="./ds-base.js"></script>
<style>
  html, body { margin: 0; height: 100%; }
  body {
    display: flex; align-items: center; justify-content: center; min-height: 100vh;
    background: #06101a; padding: 24px; box-sizing: border-box;
    font-family: var(--font-sans, -apple-system, system-ui);
  }
  .screen {
    position: relative; width: 390px; height: 760px; overflow: hidden;
    border-radius: 36px; box-shadow: 0 30px 70px rgba(0,0,0,0.5);
    background:
      radial-gradient(circle at 70% 25%, rgba(10,132,255,0.18), transparent 45%),
      repeating-linear-gradient(58deg, var(--map-road) 0 2px, transparent 2px 30px),
      repeating-linear-gradient(150deg, var(--map-road) 0 2px, transparent 2px 34px),
      var(--map-bg);
  }
  [data-lucide] { stroke-width: 2; }
</style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
    function mount() {
      const NS = window.LiiveRideDesignSystem_b6f128;
      if (!NS) { setTimeout(mount, 60); return; }
      const { GlassPanel, Badge, SOSButton, DriverCard, BottomSheet, Button } = NS;
      const Icon = (n, s) => <i data-lucide={n} style={s}></i>;

      function Screen() {
        return (
          <div className="screen">
            {/* top glass HUD */}
            <div style={{ position: "absolute", top: 16, left: 16, right: 16, display: "flex", justifyContent: "space-between", zIndex: 5 }}>
              <GlassPanel material="thin" radius="var(--radius-full)" padding="7px 12px" style={{ display: "inline-flex" }}>
                <Badge color="success" dot>Voice connected</Badge>
              </GlassPanel>
              <SOSButton size={50} />
            </div>

            {/* bottom sheet */}
            <div style={{ position: "absolute", left: 0, right: 0, bottom: 0 }}>
              <BottomSheet>
                <div style={{ fontFamily: "var(--font-sans)", fontSize: 20, fontWeight: 600, color: "var(--text)", marginBottom: 12 }}>
                  Your driver is arriving
                </div>
                <DriverCard name="John Driver" rating={4.8} vehicle="Toyota Camry · Blue" plate="ABC 123" eta="4 min" speaking
                  trailing={<Button variant="tinted" style={{ width: 44, padding: 0 }}>{Icon("phone", { width: 18, height: 18 })}</Button>} />
                <div style={{ marginTop: 14 }}>
                  <Button variant="primary" size="lg" shape="capsule" fullWidth>Share trip status</Button>
                </div>
              </BottomSheet>
            </div>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<Screen />);
      setTimeout(() => window.lucide && window.lucide.createIcons(), 80);
    }
    window.addEventListener("DOMContentLoaded", mount);
  </script>
</body>
</html>
