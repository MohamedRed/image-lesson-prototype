<!-- @dsCard group="Liive Ride" viewport="460x900" name="Rider App — interactive flow" -->
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Liive Ride — Rider App</title>
<link rel="stylesheet" href="../../styles.css" />
<style>
  html, body { margin: 0; height: 100%; background: #0a0a0b; }
  body {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 24px; box-sizing: border-box;
    background:
      radial-gradient(circle at 30% 20%, rgba(84,224,198,0.12), transparent 50%),
      radial-gradient(circle at 80% 90%, rgba(47,208,138,0.08), transparent 50%),
      #06101a;
  }
  [data-lucide] { stroke-width: 2; }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="../../_ds_bundle.js"></script>

  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="MapCanvas.jsx"></script>
  <script type="text/babel" src="screens1.jsx"></script>
  <script type="text/babel" src="screens2.jsx"></script>
  <script type="text/babel" src="RideApp.jsx"></script>

  <script type="text/babel" data-presets="react">
    function Mount() {
      return (
        <window.IOSDevice dark>
          <window.RideApp />
        </window.IOSDevice>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<Mount />);
    setTimeout(() => window.lucide && window.lucide.createIcons(), 120);
  </script>
</body>
</html>
