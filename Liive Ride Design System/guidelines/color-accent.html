<!-- @dsCard group="Colors" viewport="700x150" name="Brand Accent" subtitle="TIDE aqua · tint · pressed · on-accent ink" -->
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 20px; background: var(--bg); }
  .row { display: flex; gap: 14px; flex-wrap: wrap; }
  .sw { width: 150px; border-radius: var(--radius-lg); overflow: hidden; }
  .chip { height: 70px; display: flex; align-items: flex-end; padding: 8px 10px; }
  .meta { padding: 8px 10px; }
  .name { font: var(--weight-semibold) 13px var(--font-sans); color: var(--text); }
  .val { font: 400 11px var(--font-mono); color: var(--text-secondary); margin-top: 2px; }
  .lbl { font: var(--weight-semibold) 12px var(--font-sans); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw" style="background:var(--surface)">
      <div class="chip" style="background:var(--accent)"><span class="lbl" style="color:var(--on-accent)">Accent</span></div>
      <div class="meta"><div class="name">--accent</div><div class="val">#54E0C6</div></div>
    </div>
    <div class="sw" style="background:var(--surface)">
      <div class="chip" style="background:var(--accent-pressed)"><span class="lbl" style="color:var(--on-accent)">Pressed</span></div>
      <div class="meta"><div class="name">--accent-pressed</div><div class="val">#2EC9AD</div></div>
    </div>
    <div class="sw" style="background:var(--surface)">
      <div class="chip" style="background:var(--accent-tint)"><span class="lbl" style="color:var(--accent)">Tint</span></div>
      <div class="meta"><div class="name">--accent-tint</div><div class="val">aqua / 15%</div></div>
    </div>
    <div class="sw" style="background:var(--surface)">
      <div class="chip" style="background:var(--on-accent)"><span class="lbl" style="color:var(--accent)">On-accent</span></div>
      <div class="meta"><div class="name">--on-accent</div><div class="val">#04161A</div></div>
    </div>
  </div>
</body>
</html>
