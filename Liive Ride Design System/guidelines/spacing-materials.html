<!-- @dsCard group="Spacing" viewport="700x180" name="Materials & Blur" subtitle="Frosted glass HUD over the live map (.ultraThin / .thin / .thick)" -->
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 0; }
  .map {
    height: 180px; display: flex; gap: 18px; align-items: center; justify-content: center;
    background:
      radial-gradient(circle at 20% 30%, rgba(84,224,198,0.22), transparent 40%),
      repeating-linear-gradient(60deg, var(--map-road) 0 2px, transparent 2px 26px),
      repeating-linear-gradient(150deg, var(--map-road) 0 2px, transparent 2px 30px),
      var(--map-bg);
  }
  .panel {
    width: 150px; height: 96px; border-radius: var(--radius-lg);
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px;
    border: 1px solid var(--border-strong); box-shadow: var(--shadow-hud);
  }
  .name { font: var(--weight-semibold) 13px var(--font-sans); color: var(--text); }
  .val { font: 400 10px var(--font-mono); color: var(--text-secondary); }
</style>
</head>
<body>
  <div class="map">
    <div class="panel" style="background:var(--material-thin); -webkit-backdrop-filter:var(--blur-thin); backdrop-filter:var(--blur-thin)">
      <div class="name">Thin</div><div class="val">blur 20</div>
    </div>
    <div class="panel" style="background:var(--material-regular); -webkit-backdrop-filter:var(--blur-regular); backdrop-filter:var(--blur-regular)">
      <div class="name">Regular</div><div class="val">blur 30</div>
    </div>
    <div class="panel" style="background:var(--material-thick); -webkit-backdrop-filter:var(--blur-thick); backdrop-filter:var(--blur-thick)">
      <div class="name">Thick</div><div class="val">blur 40</div>
    </div>
  </div>
</body>
</html>
