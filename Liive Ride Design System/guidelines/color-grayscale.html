<!-- @dsCard group="Colors" viewport="700x150" name="Ink Scale" subtitle="Cool navy-black canvas ramp — ink 950 → 400" -->
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 20px; background: var(--bg); }
  .row { display: flex; gap: 0; border-radius: var(--radius-md); overflow: hidden; border: 1px solid var(--separator); }
  .sw { flex: 1; height: 72px; display: flex; align-items: flex-end; padding: 8px; }
  .name { font: var(--weight-medium) 11px var(--font-sans); color: rgba(234,244,244,0.85); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw" style="background:var(--ink-950)"><span class="name">950</span></div>
    <div class="sw" style="background:var(--ink-900)"><span class="name">900</span></div>
    <div class="sw" style="background:var(--ink-800)"><span class="name">800</span></div>
    <div class="sw" style="background:var(--ink-700)"><span class="name">700</span></div>
    <div class="sw" style="background:var(--ink-600)"><span class="name">600</span></div>
    <div class="sw" style="background:var(--ink-500)"><span class="name">500</span></div>
    <div class="sw" style="background:var(--ink-400)"><span class="name">400</span></div>
  </div>
</body>
</html>
