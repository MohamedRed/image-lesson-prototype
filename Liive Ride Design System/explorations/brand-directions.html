<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Liive Ride — Brand Directions</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=Hanken+Grotesk:wght@400;500;600;700&family=Schibsted+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; background: #f4f1ec; }
  [data-lucide] { stroke-width: 2; }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel">
    const THEMES = {
      pulse: {
        key: "pulse", name: "PULSE", idx: "A",
        tagline: "Electric minimalism · monochrome + one luminous accent",
        wordmarkTagline: "MOVE WITH THE CITY",
        fontDisplay: "'Space Grotesk', sans-serif", fontUI: "'Space Grotesk', sans-serif",
        typeName: "Space Grotesk", typeNote: "Geometric grotesque · tech-forward, precise",
        canvas: "#0A0B0D", surface: "#14161A", surface2: "#1D2026",
        text: "#F4F6F4", textSec: "rgba(244,246,244,0.55)", line: "rgba(255,255,255,0.08)",
        accent: "#C9F24D", onAccent: "#0A0B0D", accentSoft: "rgba(201,242,77,0.14)",
        mapBg: "#0D0F12", mapRoad: "#1C2026", route: "#C9F24D",
        wordmark: (s) => (
          <span style={{ fontFamily: "'Space Grotesk', sans-serif", fontWeight: 700, letterSpacing: "-0.045em", fontSize: s, color: "#F4F6F4", lineHeight: 1 }}>
            liiv<span style={{ color: "#C9F24D" }}>e</span>
          </span>
        ),
      },
      noir: {
        key: "noir", name: "NOIR", idx: "B",
        tagline: "Warm black-car luxury · serif wordmark, champagne accent",
        wordmarkTagline: "ARRIVE IN COMFORT",
        fontDisplay: "'Instrument Serif', serif", fontUI: "'Hanken Grotesk', sans-serif",
        typeName: "Instrument Serif + Hanken Grotesk", typeNote: "Editorial serif display · humanist sans UI",
        canvas: "#100C0A", surface: "#1A1512", surface2: "#241C16",
        text: "#F3EDE6", textSec: "rgba(243,237,230,0.55)", line: "rgba(255,255,255,0.08)",
        accent: "#D8B26A", onAccent: "#1A1512", accentSoft: "rgba(216,178,106,0.16)",
        mapBg: "#14100D", mapRoad: "#241C15", route: "#D8B26A",
        wordmark: (s) => (
          <span style={{ fontFamily: "'Instrument Serif', serif", fontStyle: "italic", fontSize: s * 1.18, color: "#F3EDE6", lineHeight: 1, letterSpacing: "0.005em" }}>
            Liive
          </span>
        ),
      },
      tide: {
        key: "tide", name: "TIDE", idx: "C",
        tagline: "Calm, assured premium · cool ink + luminous aqua",
        wordmarkTagline: "EVERY RIDE, ASSURED",
        fontDisplay: "'Schibsted Grotesk', sans-serif", fontUI: "'Schibsted Grotesk', sans-serif",
        typeName: "Schibsted Grotesk", typeNote: "Clean confident grotesque · quietly premium",
        canvas: "#07121A", surface: "#0E1E2A", surface2: "#15293A",
        text: "#EAF4F4", textSec: "rgba(234,244,244,0.55)", line: "rgba(255,255,255,0.08)",
        accent: "#54E0C6", onAccent: "#07121A", accentSoft: "rgba(84,224,198,0.15)",
        mapBg: "#0A1822", mapRoad: "#15293A", route: "#54E0C6",
        wordmark: (s) => (
          <span style={{ fontFamily: "'Schibsted Grotesk', sans-serif", fontWeight: 700, letterSpacing: "-0.03em", fontSize: s, color: "#EAF4F4", lineHeight: 1, display: "inline-flex", alignItems: "center", gap: s * 0.14 }}>
            liive<span style={{ width: s * 0.16, height: s * 0.16, borderRadius: "50%", background: "#54E0C6", display: "inline-block", marginBottom: s * 0.08 }}></span>
          </span>
        ),
      },
    };

    function Swatch({ c, label }) {
      return (
        <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
          <div style={{ width: 54, height: 54, borderRadius: 12, background: c, border: "1px solid rgba(255,255,255,0.10)" }}></div>
          <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 10, color: "rgba(255,255,255,0.5)" }}>{label}</span>
        </div>
      );
    }

    function Stars({ color }) {
      return (
        <span style={{ display: "inline-flex", gap: 1 }}>
          {[0,1,2,3,4].map(i => (
            <svg key={i} width="12" height="12" viewBox="0 0 24 24" fill={i < 5 ? color : "rgba(255,255,255,0.2)"}>
              <path d="M12 2l2.9 6.3 6.9.8-5.1 4.7 1.4 6.8L12 17.8 5.9 21.4l1.4-6.8L2.2 9.9l6.9-.8z"/>
            </svg>
          ))}
        </span>
      );
    }

    function RideScreen({ t }) {
      return (
        <div style={{
          position: "relative", width: 400, height: 720, borderRadius: 34, overflow: "hidden",
          background: t.mapBg, fontFamily: t.fontUI,
          boxShadow: "0 30px 60px rgba(0,0,0,0.4), 0 0 0 1px rgba(0,0,0,0.3)",
        }}>
          {/* map */}
          <svg viewBox="0 0 400 720" preserveAspectRatio="xMidYMid slice" style={{ position: "absolute", inset: 0, width: "100%", height: "100%" }}>
            <g stroke={t.mapRoad} strokeWidth="9" strokeLinecap="round">
              <line x1="-20" y1="250" x2="430" y2="225" /><line x1="-20" y1="400" x2="430" y2="380" />
              <line x1="-20" y1="540" x2="430" y2="560" /><line x1="80" y1="-20" x2="120" y2="760" />
              <line x1="230" y1="-20" x2="260" y2="760" /><line x1="350" y1="-20" x2="375" y2="760" />
            </g>
            <g stroke={t.mapRoad} strokeWidth="4" strokeLinecap="round" opacity="0.6">
              <line x1="-20" y1="170" x2="430" y2="160" /><line x1="160" y1="-20" x2="185" y2="760" />
            </g>
            <path d="M196,470 C 170,400 300,330 250,165" fill="none" stroke={t.route} strokeWidth="6" strokeLinecap="round" />
          </svg>
          {/* origin + car */}
          <Marker x={196} y={470} color={t.route} ring />
          <Marker x={250} y={165} color={t.text} pin />
          <CarMarker x={232} y={300} t={t} />

          {/* status time */}
          <div style={{ position: "absolute", top: 16, left: 24, fontFamily: t.fontUI, fontWeight: 600, fontSize: 15, color: t.text }}>9:41</div>

          {/* top HUD */}
          <div style={{ position: "absolute", top: 48, left: 16, right: 16, display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
            <div style={{
              display: "inline-flex", alignItems: "center", gap: 7, padding: "8px 13px", borderRadius: 999,
              background: "rgba(255,255,255,0.07)", backdropFilter: "blur(16px) saturate(160%)", WebkitBackdropFilter: "blur(16px) saturate(160%)",
              border: "0.5px solid rgba(255,255,255,0.12)",
            }}>
              <span style={{ width: 7, height: 7, borderRadius: "50%", background: t.accent }}></span>
              <span style={{ fontFamily: t.fontUI, fontSize: 13, fontWeight: 600, color: t.text }}>Voice connected</span>
            </div>
            <div style={{
              width: 40, height: 40, borderRadius: "50%", background: "#FF453A",
              display: "flex", alignItems: "center", justifyContent: "center",
              fontFamily: t.fontUI, fontWeight: 700, fontSize: 12, color: "#fff",
              boxShadow: "0 4px 14px rgba(255,69,58,0.4)",
            }}>SOS</div>
          </div>

          {/* bottom sheet */}
          <div style={{
            position: "absolute", left: 0, right: 0, bottom: 0,
            background: t.surface, borderTopLeftRadius: 30, borderTopRightRadius: 30,
            padding: "10px 20px 30px", boxShadow: "0 -10px 40px rgba(0,0,0,0.35)",
          }}>
            <div style={{ width: 36, height: 5, borderRadius: 99, background: "rgba(255,255,255,0.18)", margin: "0 auto 16px" }}></div>
            <div style={{ fontFamily: t.fontDisplay, fontSize: t.key === "noir" ? 30 : 22, fontWeight: t.key === "noir" ? 400 : 600, fontStyle: t.key === "noir" ? "italic" : "normal", color: t.text, marginBottom: 14, letterSpacing: t.key === "noir" ? 0 : "-0.02em" }}>
              Your driver is arriving
            </div>

            <div style={{ display: "flex", alignItems: "center", gap: 13, background: t.surface2, borderRadius: 16, padding: 13 }}>
              <span style={{ width: 50, height: 50, borderRadius: "50%", background: t.accentSoft, color: t.accent, display: "inline-flex", alignItems: "center", justifyContent: "center", fontFamily: t.fontUI, fontWeight: 700, fontSize: 18, flex: "none" }}>JD</span>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 7 }}>
                  <span style={{ fontFamily: t.fontUI, fontSize: 16, fontWeight: 600, color: t.text }}>John Driver</span>
                  <Stars color={t.accent} />
                </div>
                <div style={{ fontFamily: t.fontUI, fontSize: 13, color: t.textSec, marginTop: 2 }}>
                  Toyota Camry · <span style={{ color: t.text, fontWeight: 600 }}>ABC 123</span>
                </div>
              </div>
              <div style={{ textAlign: "right", flex: "none" }}>
                <div style={{ fontFamily: t.fontDisplay, fontVariantNumeric: "tabular-nums", fontSize: 22, fontWeight: 700, color: t.accent, lineHeight: 1, fontStyle: t.key === "noir" ? "italic" : "normal" }}>4 min</div>
                <div style={{ fontFamily: t.fontUI, fontSize: 11, color: t.textSec, marginTop: 3 }}>away</div>
              </div>
            </div>

            <button style={{
              marginTop: 14, width: "100%", height: 52, border: "none", borderRadius: 999,
              background: t.accent, color: t.onAccent, cursor: "pointer",
              fontFamily: t.fontUI, fontSize: 16, fontWeight: 700, letterSpacing: t.key === "pulse" ? "0.01em" : 0,
            }}>Share trip status</button>
          </div>
        </div>
      );
    }

    function Marker({ x, y, color, ring, pin }) {
      return (
        <div style={{ position: "absolute", left: x, top: y, transform: "translate(-50%,-50%)" }}>
          {ring && <span style={{ position: "absolute", inset: -10, borderRadius: "50%", background: color, opacity: 0.18 }}></span>}
          <span style={{ position: "relative", width: pin ? 16 : 16, height: 16, borderRadius: "50%", background: color, border: "3px solid #fff", display: "block", boxShadow: "0 3px 8px rgba(0,0,0,0.4)" }}></span>
        </div>
      );
    }
    function CarMarker({ x, y, t }) {
      return (
        <div style={{ position: "absolute", left: x, top: y, transform: "translate(-50%,-50%)" }}>
          <span style={{ width: 38, height: 38, borderRadius: "50%", background: t.route, border: "2.5px solid #fff", display: "inline-flex", alignItems: "center", justifyContent: "center", boxShadow: "0 4px 10px rgba(0,0,0,0.45)" }}>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke={t.onAccent} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
              <path d="M5 17a2 2 0 1 0 4 0M15 17a2 2 0 1 0 4 0"/><path d="M3 13l2-5a2 2 0 0 1 2-1h10a2 2 0 0 1 2 1l2 5v4H3z"/>
            </svg>
          </span>
        </div>
      );
    }

    function Board({ t }) {
      return (
        <div style={{ width: 460, padding: 30, boxSizing: "border-box", background: t.canvas, borderRadius: 24 }}>
          {/* header */}
          <div style={{ display: "flex", alignItems: "flex-end", justifyContent: "space-between", marginBottom: 6 }}>
            {t.wordmark(44)}
            <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 12, color: t.accent }}>{t.idx}</span>
          </div>
          <div style={{ fontFamily: t.fontUI, fontSize: 12, letterSpacing: "0.18em", color: t.textSec, textTransform: "uppercase", marginBottom: 18 }}>{t.wordmarkTagline}</div>
          <div style={{ fontFamily: t.fontUI, fontSize: 14, color: t.textSec, lineHeight: 1.5, marginBottom: 22, borderTop: `1px solid ${t.line}`, paddingTop: 16 }}>{t.tagline}</div>

          {/* palette */}
          <div style={{ display: "flex", gap: 12, marginBottom: 22 }}>
            <Swatch c={t.accent} label={t.accent} />
            <Swatch c={t.canvas} label="canvas" />
            <Swatch c={t.surface} label="surface" />
            <Swatch c={t.surface2} label="raised" />
            <Swatch c={t.text} label="text" />
          </div>

          {/* type */}
          <div style={{ display: "flex", alignItems: "center", gap: 16, marginBottom: 26, borderTop: `1px solid ${t.line}`, paddingTop: 18 }}>
            <span style={{ fontFamily: t.fontDisplay, fontSize: 54, color: t.text, lineHeight: 1, fontStyle: t.key === "noir" ? "italic" : "normal" }}>Aa</span>
            <div>
              <div style={{ fontFamily: t.fontUI, fontSize: 15, fontWeight: 600, color: t.text }}>{t.typeName}</div>
              <div style={{ fontFamily: t.fontUI, fontSize: 13, color: t.textSec, marginTop: 3, maxWidth: 230, lineHeight: 1.4 }}>{t.typeNote}</div>
            </div>
          </div>

          {/* phone */}
          <RideScreen t={t} />
        </div>
      );
    }

    const { DesignCanvas, DCSection, DCArtboard } = window;
    function App() {
      return (
        <DesignCanvas>
          <DCSection id="brand" title="Liive Ride — Brand Directions" subtitle="Premium · sleek · minimal · fully custom. Pick one and I'll re-skin the whole system.">
            <DCArtboard id="pulse" label="A · PULSE — electric lime / Space Grotesk" width={520} height={1240}>
              <div style={{ display: "flex", justifyContent: "center", paddingTop: 30 }}><Board t={THEMES.pulse} /></div>
            </DCArtboard>
            <DCArtboard id="noir" label="B · NOIR — champagne / Instrument Serif" width={520} height={1240}>
              <div style={{ display: "flex", justifyContent: "center", paddingTop: 30 }}><Board t={THEMES.noir} /></div>
            </DCArtboard>
            <DCArtboard id="tide" label="C · TIDE — aqua / Schibsted Grotesk" width={520} height={1240}>
              <div style={{ display: "flex", justifyContent: "center", paddingTop: 30 }}><Board t={THEMES.tide} /></div>
            </DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    setTimeout(() => window.lucide && window.lucide.createIcons(), 150);
  </script>
</body>
</html>
