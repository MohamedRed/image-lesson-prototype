name: Android CI

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/android-ci.yml"
      - "android/**"
      - "Liive Ride Design System/**"
  pull_request:
    paths:
      - ".github/workflows/android-ci.yml"
      - "android/**"
      - "Liive Ride Design System/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android-unit-tests:
    name: Android Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.4.0"

      - name: Run Android unit tests
        run: gradle -p android :app:testDebugUnitTest --no-daemon --no-configuration-cache --console=plain
